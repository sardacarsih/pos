name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Penjualan
        run: dotnet publish Penjualan/Penjualan.csproj -c Release --no-self-contained -o publish/Penjualan

      - name: Build BackOffice
        run: dotnet publish BackOffice/BackOffice.csproj -c Release --no-self-contained -o publish/BackOffice

      - name: Zip Penjualan
        run: Compress-Archive -Path publish/Penjualan/* -DestinationPath publish/Penjualan-${{ github.ref_name }}.zip

      - name: Zip BackOffice
        run: Compress-Archive -Path publish/BackOffice/* -DestinationPath publish/BackOffice-${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            publish/Penjualan-${{ github.ref_name }}.zip
            publish/BackOffice-${{ github.ref_name }}.zip
